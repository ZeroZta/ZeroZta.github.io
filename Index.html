<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guía de Supervivencia - CBT 4</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
    <style>
        body { max-width: 800px; margin: auto; padding: 20px; line-height: 1.6; }
        .tarea-card { 
            background: #f9f9f9; 
            padding: 1.5rem; 
            border-radius: 10px; 
            border-left: 6px solid #d32f2f; 
            margin-bottom: 2rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .tag-fecha { 
            background: #d32f2f; 
            color: white; 
            padding: 2px 10px; 
            border-radius: 5px; 
            font-size: 0.8rem; 
            font-weight: bold;
        }
        .tip-oro { 
            background: #fff9c4; 
            padding: 1rem; 
            border-radius: 5px; 
            border: 1px dashed #fbc02d;
            margin-top: 10px;
        }
        h1 { text-align: center; color: #d32f2f; }
    </section>
</head>
<body>
    <h1>📋 Guía de Revisión de Libreta</h1>
    <p style="text-align: center;"><em>Materia: Práctica Ciudadana | Mtra. Dayana</em></p>

    <div class="tip-oro">
        <strong>💡 Tip General:</strong> Si la portada no tiene relación con el tema de "Emociones y Violencia", la maestra no revisará el resto de la libreta. ¡Cuidado ahí!
    </div>

    <h2>📝 Orden de las Tareas</h2>

    <div class="tarea-card">
        <h3>Tarea 3: Infografía <span class="tag-fecha">24 ABR</span></h3>
        <p>Trabajo visual sobre el autoconocimiento y señales físicas.</p>
        <ul>
            <li><strong>Dibujo:</strong> Silueta humana con zonas de dolor/tensión.</li>
            <li><strong>Semáforo:</strong> Rojo (Alto), Amarillo (Pensar), Verde (Actuar).</li>
            <li><strong>Herramientas:</strong> Respiración 4-7-8 y Tiempo Fuera.</li>
        </ul>
    </div>

    <div class="tarea-card">
        <h3>Tarea 4: Análisis de Casos <span class="tag-fecha">01 MAY</span></h3>
        <p><strong>⚠️ AVISO:</strong> Esta sección debe estar escrita <strong>totalmente a mano</strong>. No imprimas los casos resueltos.</p>
        <p>Puedes consultar las soluciones en el archivo README del repositorio para transcribirlas.</p>
    </div>

    <div class="tarea-card">
        <h3>Tarea 5: Campaña Final <span class="tag-fecha">08 MAY</span></h3>
        <p>Valor: <strong>30% de la calificación</strong>. Recuerda llevar la rúbrica impresa y no leer durante la exposición.</p>
    </div>

    <footer style="text-align: center; margin-top: 40px; color: #666;">
        <p>CBT No.4 Huehuetoca - 2026</p>
    </footer>
</body>
</html>
