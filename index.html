<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISO/IEC 17025 | Exposición Profesional</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0ea5e9;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
            --accent: #38bdf8;
            --transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            scroll-behavior: smooth;
        }

        .background-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            z-index: -1;
        }

    #portal {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    transition: var(--transition);
    padding: 80px 20px 40px 20px;
    box-sizing: border-box;
}
.main-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 8vw, 4.5rem);
    margin-bottom: 10px;
    line-height: 1.2;
    background: linear-gradient(to right, #fff, var(--primary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}
        .credits {
            font-weight: 300; opacity: 0.8; letter-spacing: 1px;
            margin-bottom: 50px; font-size: 1.1rem;
        }

        .selector-text { font-size: 1.5rem; margin-bottom: 30px; font-weight: 300; }

        .grid-menu {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px; max-width: 1000px; width: 100%;
        }

        .card-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: white; padding: 25px; border-radius: 20px;
            cursor: pointer; backdrop-filter: blur(15px);
            transition: all 0.4s ease;
            display: flex; flex-direction: column; gap: 10px;
        }

        .card-btn:hover {
            background: rgba(14, 165, 233, 0.15);
            border-color: var(--primary);
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        .card-btn b { font-size: 1.2rem; color: var(--accent); }
        .card-btn span { font-size: 0.85rem; opacity: 0.7; }

        .btn-full {
            grid-column: 1 / -1;
            background: linear-gradient(90deg, rgba(14, 165, 233, 0.2), transparent);
            font-weight: 600; font-size: 1.2rem;
        }

        /* --- CONTENEDOR DE CONTENIDO --- */
        #main-content {
            display: none; opacity: 0;
            padding: 60px 20px; max-width: 900px; margin: auto;
            transition: var(--transition);
        }

        .glass-panel {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: clamp(30px, 8vw, 60px);
            border-radius: 30px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .sticky-nav {
            position: fixed; top: 20px; left: 20px; z-index: 100;
        }

        .btn-back {
            background: var(--primary); color: white; border: none;
            padding: 12px 25px; border-radius: 50px; cursor: pointer;
            font-weight: 600; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* --- ESTILOS DE GUION --- */
        .section-tag {
            display: inline-block; background: var(--primary);
            color: white; padding: 4px 12px; border-radius: 5px;
            font-size: 0.8rem; font-weight: bold; margin-bottom: 15px;
        }

        .speaker-info {
            border-left: 4px solid var(--primary);
            padding-left: 20px; margin-bottom: 40px;
        }

        .speaker-info h2 { font-family: 'Playfair Display', serif; font-size: 2.2rem; margin: 0; }
        .speaker-info span { color: var(--accent); letter-spacing: 2px; text-transform: uppercase; font-size: 0.9rem; }

        .action-box {
            background: rgba(255,255,255,0.05); padding: 20px;
            border-radius: 12px; font-style: italic; color: #94a3b8;
            margin: 25px 0; border-left: 3px solid #475569;
        }

        .script-text { line-height: 1.9; font-size: 1.15rem; color: #cbd5e1; }
        .script-text p { margin-bottom: 25px; }
        .highlight { color: #fff; font-weight: 600; border-bottom: 1px solid var(--primary); }

        /* --- ACORDEÓN --- */
        details { background: rgba(255,255,255,0.02); margin-bottom: 15px; border-radius: 12px; border: 1px solid var(--glass-border); }
        summary { padding: 20px; cursor: pointer; color: var(--accent); font-weight: 600; font-size: 1.1rem; }
        .faq-body { padding: 0 20px 20px 20px; color: #cbd5e1; line-height: 1.6; }

        .hidden { display: none; }
        .fade-in { animation: fadeIn 1s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="background-layer"></div>

    <div class="sticky-nav">
        <button class="btn-back hidden" id="backBtn" onclick="showPortal()">← VOLVER AL MENÚ</button>
    </div>

    <div id="portal">
        <h1 class="main-title">ISO/IEC 17025</h1>
        <p class="credits">Esta página fue hecha por Gemini y dirigida por Alan Ríos</p>
        
        <p class="selector-text">¿Quién eres hoy?</p>
        
        <div class="grid-menu">
            <button class="card-btn" onclick="loadContent('alan')">
                <b>Alan</b>
                <span>Partes 1, 6 y 7 (Presentador)</span>
            </button>
            <button class="card-btn" onclick="loadContent('cristy')">
                <b>Cristy</b>
                <span>Parte 2 (Tema 1)</span>
            </button>
            <button class="card-btn" onclick="loadContent('victor')">
                <b>Víctor</b>
                <span>Parte 3 (Tema 2)</span>
            </button>
            <button class="card-btn" onclick="loadContent('arely')">
                <b>Arely</b>
                <span>Parte 4 (Tema 3)</span>
            </button>
            <button class="card-btn" onclick="loadContent('leslie')">
                <b>Leslie</b>
                <span>Parte 5 (Tema 4)</span>
            </button>
            <button class="card-btn" onclick="loadContent('acordeon')">
                <b>Acordeón 🛡️</b>
                <span>Preguntas Técnicas</span>
            </button>
            <button class="card-btn btn-full" onclick="loadContent('completo')">
                <b>VER GUIÓN COMPLETO (15 MINUTOS)</b>
                <span>Sin cortes ni interrupciones</span>
            </button>
        </div>
    </div>

    <div id="main-content">
        <div class="glass-panel fade-in" id="display-area">
            </div>
    </div>

    <script>
        const SCRIPT_DATA = {
            alan: `
                <div class="speaker-info">
                    <span>Presentador</span>
                    <h2>Alan Ríos</h2>
                </div>
                
                <span class="section-tag">TEXTO 1: INICIO (0:00 - 1:30)</span>
                <div class="action-box">Posiciónate al centro, postura segura. Tómate tu tiempo, no te apresures.</div>
                <div class="script-text">
                    <p>"Buenos días a todos. Quiero que imaginen por un momento la siguiente situación: Ustedes compran un medicamento para un familiar enfermo que debe contener exactamente 500mg de sustancia activa. ¿Qué pasaría si el laboratorio que analizó esa pastilla tenía su balanza descalibrada y en realidad tiene 200mg? O piensen en la construcción de un puente: si el laboratorio que probó la resistencia del concreto cometió un error de cálculo, ese puente podría colapsar."</p>
                    <p>"La pregunta es: ¿Cómo evitamos que esto pase? La respuesta no es solo tener 'buenas intenciones' o 'hacerlo con cuidado'. La respuesta es demostrar técnicamente, bajo estándares internacionales, que sabemos hacerlo bien."</p>
                    <p>"Nosotros somos el equipo encargado de presentar la <span class="highlight">norma ISO/IEC 17025</span>, el estándar mundial que separa a los laboratorios profesionales de los simples aficionados."</p>
                    <p>"Mi equipo está conformado por Cristy, Víctor, Arely, Leslie y su servidor, Alan. Durante los próximos 15 minutos no solo les diremos qué dice la norma, sino cómo esta garantiza la calidad y la confianza en la ciencia que mueve al mundo. Para entender la estructura medular de este estándar, le cedo la palabra a mi compañera Cristy."</p>
                </div>

                <hr style="margin: 60px 0; opacity: 0.1;">

                <span class="section-tag">TEXTO 6: TEMA 5 (12:30 - 14:00)</span>
                <div class="action-box">Retoma el centro del escenario. Tono profesional.</div>
                <div class="script-text">
                    <p>"Gracias, Leslie. Para concluir, es vital entender que la norma protege el ciclo de vida completo del dato. Mucha gente cree erróneamente que la norma solo aplica al momento de estar frente al microscopio, pero no. El alcance es total:"</p>
                    <p><b>El Muestreo:</b> Si tomamos mal la muestra en el río o en la fábrica, el resultado no sirve, aunque el equipo sea el mejor del mundo. La norma empieza ahí. <br>
                    <b>El Transporte:</b> Asegurar que la muestra no se degradó, se calentó o se contaminó en el camino al laboratorio.<br>
                    <b>La Incertidumbre de medición:</b> Este es el punto más técnico y crítico. Ninguna medición en el universo es perfecta; siempre hay una variación. La norma nos obliga a calcular y reportar esa 'duda técnica' (el margen de ± error). Un resultado sin incertidumbre es un resultado incompleto.<br>
                    <b>Reglas de decisión:</b> Debemos acordar con el cliente cómo decidimos si algo 'Pasa' o 'No Pasa' considerando esa incertidumbre.</p>
                </div>

                <span class="section-tag">TEXTO 7: CIERRE (14:00 - 15:00)</span>
                <div class="script-text">
                    <p>"En conclusión: La ISO/IEC 17025 no es un simple trámite burocrático. Es el lenguaje universal de la calidad técnica. Nos sirve para garantizar que la ciencia aplicada a nuestra vida diaria sea exacta, segura y confiable. Sin ella, no tendríamos comercio internacional fluido, ni garantías de que el agua que bebemos es potable, ni seguridad en las medicinas que tomamos."</p>
                    <p>"Es la diferencia entre 'creer' que algo está bien y 'saber' que está bien. Muchas gracias por su atención. En este momento, abrimos el espacio para cualquier pregunta que el profesor o ustedes tengan sobre el tema."</p>
                </div>
            `,
            cristy: `
                <div class="speaker-info">
                    <span>Parte 2</span>
                    <h2>Cristy</h2>
                </div>
                <span class="section-tag">TEXTO 2: TEMA 1 (1:30 - 4:15)</span>
                <div class="action-box">Da un paso al frente con seguridad.</div>
                <div class="script-text">
                    <p>"Gracias, Alan. Para empezar, definamos con precisión: La ISO/IEC 17025 es la normativa internacional desarrollada para acreditar la competencia técnica de los laboratorios de ensayo y calibración."</p>
                    <p>"Es vital entender una diferencia clave que suele confundir a la industria: Muchas empresas presumen tener ISO 9001. Eso es excelente, pero la 9001 certifica la gestión administrativa; dice que eres ordenado. La 17025 va mucho más allá: <span class="highlight">acredita que el laboratorio es competente</span>. Significa que el personal sabe ejecutar las pruebas, que las condiciones ambientales son controladas y que sus equipos no mienten."</p>
                    <p>"¿En qué se basa esta norma? En su versión más reciente (2017), la norma evolucionó. Ya no es solo una lista de reglas, ahora se basa en una filosofía de dos pilares:"</p>
                    <p><b>El enfoque a procesos:</b> Ya no vemos el laboratorio como departamentos aislados. Lo vemos como un flujo continuo donde la salida de un proceso es la entrada del siguiente. Si falla la recepción de la muestra, fallará el resultado final.<br>
                    <b>El pensamiento basado en riesgos:</b> Este es el cambio más radical. El laboratorio debe actuar preventivamente. Ya no esperamos a que ocurra el error. Debemos preguntarnos: '¿Qué podría salir mal en esta prueba de pH?' tal vez que el electrodo esté sucio o que la temperatura suba. La norma nos obliga a identificar esos riesgos y poner controles antes de que sucedan. No se trata de corregir el pasado, sino de asegurar el futuro."</p>
                    <p>"Ahora, Víctor nos explicará los cimientos éticos y globales de esta norma."</p>
                </div>
            `,
            victor: `
                <div class="speaker-info">
                    <span>Parte 3</span>
                    <h2>Víctor</h2>
                </div>
                <span class="section-tag">TEXTO 3: TEMA 2 (4:15 - 7:00)</span>
                <div class="action-box">Señala en el cartel los iconos. Usa gestos amplios.</div>
                <div class="script-text">
                    <p>"Exacto. Un laboratorio puede tener los mejores equipos del mundo, comprados ayer en Alemania. Pero si no tiene ética, esos equipos no sirven de nada. La norma exige tres fundamentos inquebrantables:"</p>
                    <p><b>Imparcialidad:</b> El laboratorio no puede ceder a presiones. Imaginen que un cliente importante nos dice: 'Necesito que esta agua salga limpia para no pagar multa'. La norma nos obliga a blindarnos ante eso. El resultado es el que es, le guste al cliente o no.<br>
                    <b>Confidencialidad:</b> Manejamos secretos industriales. Si Coca-Cola nos manda a analizar su fórmula, o un paciente sus análisis genéticos, esos datos deben estar protegidos informáticamente y físicamente.<br>
                    <b>Consistencia Operativa:</b> Si yo hago el ensayo hoy, y mi compañero Alan lo hace mañana, el resultado debe ser estadísticamente igual. No puede depender del humor del analista."</p>
                    <p>"¿Y cuáles son los objetivos reales de todo esto? Más allá de la calidad, el objetivo técnico es lograr la <span class="highlight">aceptación internacional</span>. Esto se logra gracias a los Acuerdos de Reconocimiento Mutuo de ILAC (Cooperación Internacional de Acreditación de Laboratorios)."</p>
                    <p>"El lema es: 'Probado una vez, aceptado en todas partes'. Si un laboratorio en México se acredita con la entidad local (como la ema), y esa entidad es parte de ILAC, su informe tiene validez técnica en Japón, Estados Unidos o Francia. Esto elimina la necesidad de volver a probar productos al cruzar fronteras. Para profundizar en el impacto económico y legal de esto, los dejo con Arely."</p>
                </div>
            `,
            arely: `
                <div class="speaker-info">
                    <span>Parte 4</span>
                    <h2>Arely</h2>
                </div>
                <span class="section-tag">TEXTO 4: TEMA 3 (7:00 - 9:45)</span>
                <div class="action-box">Tono serio y persuasivo. Usa ejemplos concretos.</div>
                <div class="script-text">
                    <p>"Gracias, Víctor. Como hemos visto, esto suena muy técnico, pero la importancia de la ISO 17025 impacta nuestra vida diaria en tres niveles críticos:"</p>
                    <p><b>Para el Cliente y el Consumidor (Seguridad):</b> Nos da la certeza de que lo que consumimos es seguro. Cuando ven una etiqueta nutrimental o un sello de seguridad en un juguete, detrás hubo un laboratorio. Sin esta norma, comer alimentos procesados o usar materiales de construcción sería una apuesta de alto riesgo.</p>
                    <p><b>Para el Comercio (Exportación):</b> Aquí es donde entra el dinero. La norma funciona como un 'pasaporte técnico'. Pensemos en el aguacate o el tequila mexicano. Para exportarlo a Europa, piden análisis de pesticidas. Si el laboratorio mexicano no está acreditado bajo la 17025, Europa rechazará el análisis y obligará al exportador a pagar nuevas pruebas allá, en euros, perdiendo tiempo y dinero. La norma elimina estas Barreras Técnicas al Comercio.</p>
                    <p><b>Defensa Legal:</b> En un juicio, un informe de un laboratorio acreditado es una prueba contundente. Si hay una demanda ambiental por contaminación de un río, el juez le dará peso probatorio pleno al laboratorio acreditado. Un informe de un laboratorio 'patito' (sin norma) será desestimado inmediatamente por la defensa."</p>
                    <p>"Pero, para lograr este nivel de autoridad, necesitamos cumplir requisitos físicos muy estrictos. Leslie nos lo detalla."</p>
                </div>
            `,
            leslie: `
                <div class="speaker-info">
                    <span>Parte 5</span>
                    <h2>Leslie</h2>
                </div>
                <span class="section-tag">TEXTO 5: TEMA 4 (9:45 - 12:30)</span>
                <div class="action-box">Usa las manos para enumerar. Habla pausado en los puntos técnicos.</div>
                <div class="script-text">
                    <p>"Para que un laboratorio pueda ostentar el logo de acreditación, necesitamos cubrir requisitos rigurosos, que la norma divide en secciones clave:"</p>
                    <p><b>Primero, Requisitos de Recursos:</b><br>
                    - Personal: No basta con el título. El analista debe estar autorizado y demostrar cada año que sigue siendo competente.<br>
                    - Equipamiento: Todo equipo que afecte el resultado debe tener trazabilidad metrológica, es decir, estar calibrado.<br>
                    - Instalaciones: El ambiente importa. Si la prueba requiere 20°C y estamos a 30°C, el resultado no sirve.</p>
                    <p><b>Segundo, Requisitos de Proceso:</b><br>
                    - Selección y Verificación de Métodos: Usamos métodos estandarizados (NMX, ISO, ASTM). Antes de usarlos, demostramos con pruebas piloto que funcionan bien en nuestras manos.<br>
                    - Aseguramiento de validez: Participamos en 'Ensayos de Aptitud', que son exámenes sorpresa donde un organismo externo nos manda una muestra ciega para ver si acertamos el resultado.</p>
                    <p><b>Tercero, Sistema de Gestión:</b> Necesitamos control de documentos y auditorías. Básicamente, trazabilidad: la capacidad de reconstruir la historia de una medición solo revisando registros."</p>
                    <p>"Finalmente, Alan cerrará explicándonos el alcance total y las conclusiones."</p>
                </div>
            `,
            acordeon: `
                <div class="speaker-info">
                    <span>Defensa Técnica</span>
                    <h2>Acordeón "A Prueba de Balas"</h2>
                </div>
                <details>
                    <summary>1. Diferencia entre Validación y Verificación</summary>
                    <div class="faq-body">"La Validación se hace cuando desarrollamos un método nuevo; demostramos que sirve desde cero. La Verificación es demostrar que podemos cumplir un método que ya es oficial (como una norma NMX) en nuestras instalaciones. La mayoría de los laboratorios solo verifican".</div>
                </details>
                <details>
                    <summary>2. ¿Qué es un Ensayo de Aptitud?</summary>
                    <div class="faq-body">"Es una evaluación externa. Un proveedor acreditado nos envía una muestra desconocida. La analizamos, enviamos el resultado y nos califican comparándonos con otros laboratorios (Z-score). Si salimos mal, hay una 'No conformidad' que corregir".</div>
                </details>
                <details>
                    <summary>3. ¿Qué es la Incertidumbre de Medición?</summary>
                    <div class="faq-body">"No es un error. El error es la falla; la incertidumbre es un intervalo (±) que nos dice dónde es probable que esté el valor verdadero. Es la 'duda técnica' inevitable en cualquier medición científica".</div>
                </details>
                <details>
                    <summary>4. ¿Qué es la Trazabilidad Metrológica?</summary>
                    <div class="faq-body">"Es la cadena ininterrumpida de comparaciones que vincula nuestra medición con patrones internacionales. Garantiza que mi kilo pese lo mismo que el kilo del patrón nacional".</div>
                </details>
                <details>
                    <summary>5. ¿Quién te acredita en México?</summary>
                    <div class="faq-body">"La más conocida es la <b>ema</b> (Entidad Mexicana de Acreditación), aunque hoy existen otras como MAAC o Sivarty".</div>
                </details>
                <details>
                    <summary>6. Certificación vs Acreditación</summary>
                    <div class="faq-body">"Certificación (ISO 9001) es gestión/orden administrativo. Acreditación (ISO 17025) es competencia técnica. La certificación dice que eres ordenado; la acreditación dice que sabes medir bien".</div>
                </details>
            `,
            completo: `
                <div class="speaker-info">
                    <span>Guion Integral</span>
                    <h2>Transcripción Completa (15 Minutos)</h2>
                </div>
                <div class="script-text">
                    <div style="opacity:0.7">Contenido concatenado para lectura fluida...</div>
                    <br>
                    ${'/* Se inyecta dinámicamente */'}
                </div>
            `
        };

        function loadContent(key) {
            const portal = document.getElementById('portal');
            const main = document.getElementById('main-content');
            const display = document.getElementById('display-area');
            const back = document.getElementById('backBtn');

            portal.style.opacity = '0';
            setTimeout(() => {
                portal.style.display = 'none';
                main.style.display = 'block';
                back.classList.remove('hidden');

                if(key === 'completo') {
                    // Combinar todos los guiones en orden
                    display.innerHTML = SCRIPT_DATA.alan.split('<hr')[0] + SCRIPT_DATA.cristy + SCRIPT_DATA.victor + SCRIPT_DATA.arely + SCRIPT_DATA.leslie + SCRIPT_DATA.alan.split('<hr')[1];
                } else {
                    display.innerHTML = SCRIPT_DATA[key];
                }

                setTimeout(() => { main.style.opacity = '1'; }, 50);
            }, 800);
        }

        function showPortal() {
            const portal = document.getElementById('portal');
            const main = document.getElementById('main-content');
            const back = document.getElementById('backBtn');

            main.style.opacity = '0';
            setTimeout(() => {
                main.style.display = 'none';
                portal.style.display = 'flex';
                back.classList.add('hidden');
                setTimeout(() => { portal.style.opacity = '1'; }, 50);
            }, 800);
        }
    </script>
</body>
</html>
